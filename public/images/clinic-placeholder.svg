<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f0f9ff"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e0f0fa" stroke-width="1"/>
  </pattern>
  <rect width="800" height="450" fill="url(#grid)"/>

  <!-- Cross / medical icon -->
  <g transform="translate(400, 195)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="56" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
    <!-- Cross horizontal -->
    <rect x="-24" y="-9" width="48" height="18" rx="4" fill="#2563eb"/>
    <!-- Cross vertical -->
    <rect x="-9" y="-24" width="18" height="48" rx="4" fill="#2563eb"/>
  </g>

  <!-- Label -->
  <text x="400" y="295" text-anchor="middle" font-family="'Public Sans', Arial, sans-serif" font-size="15" font-weight="600" fill="#64748b">Travel Vaccine Clinic</text>
  <text x="400" y="316" text-anchor="middle" font-family="'Public Sans', Arial, sans-serif" font-size="13" fill="#94a3b8">Photo coming soon</text>
</svg>
