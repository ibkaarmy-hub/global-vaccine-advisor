name: Update health alerts (fortnightly)

# Pulls alerts from CDC, WHO, NaTHNaC, PHAC, Smartraveller, and ECDC and commits
# data/health-alerts.json to main. The deploy workflow then rebuilds the site.

on:
  schedule:
    # 06:00 UTC every other Monday. GitHub cron has no native fortnightly cadence,
    # so the script's $retention_days window absorbs minor schedule drift.
    - cron: "0 6 1-7,15-21 * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-health-alerts
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch alerts
        run: node scripts/update-health-alerts.mjs

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/health-alerts.json; then
            echo "No alert changes."
            exit 0
          fi
          git add data/health-alerts.json
          git commit -m "chore(alerts): refresh health alerts $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
